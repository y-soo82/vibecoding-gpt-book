<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>바이브코딩 GPT 입문서</title>
    <style>
      :root {
        --bg: #f6f1e8;
        --paper: #fffaf2;
        --ink: #28231f;
        --muted: #70665c;
        --line: #ded1c2;
        --teal: #226b63;
        --rose: #b5584b;
        --radius: 8px;
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 42px 0;
      }

      .hero {
        padding: 30px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        box-shadow: 0 22px 60px rgba(48, 39, 30, 0.14);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--teal);
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 7vw, 4.8rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .lead {
        max-width: 720px;
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.75;
      }

      .link-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 28px;
      }

      a {
        display: grid;
        min-height: 142px;
        align-content: space-between;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        color: var(--ink);
        text-decoration: none;
      }

      a strong {
        font-size: 1.1rem;
      }

      a span {
        color: var(--muted);
        line-height: 1.55;
      }

      .version {
        margin-top: 18px;
        color: var(--rose);
        font-weight: 800;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 24px, 520px);
          padding: 24px 0;
        }

        .hero {
          padding: 22px;
        }

        .link-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- build: 20260516-p0-001 -->
    <main>
      <section class="hero" aria-label="바이브코딩 GPT 입문서 보기">
        <p class="eyebrow">바이브코딩 출판 프로젝트</p>
        <h1>GPT 입문서 작업본</h1>
        <p class="lead">현재까지 제작한 반응형 웹북, 이미지 한 장으로 만든 첫 웹사이트, 타로카드 리딩 웹사이트를 웹에서 확인할 수 있습니다.</p>
        <div class="link-grid">
          <a href="./webbook/?v=20260516-p0-001">
            <strong>반응형 웹북</strong>
            <span>원고, 프롬프트 복사 버튼, 캡처 이미지 98개를 확인합니다.</span>
          </a>
          <a href="./examples/first-site/?v=20260516-p0-001">
            <strong>첫 웹사이트</strong>
            <span>이미지 한 장으로 만든 소개 사이트 예제를 확인합니다.</span>
          </a>
          <a href="./examples/tarot-site/?v=20260516-p0-001">
            <strong>타로카드 사이트</strong>
            <span>주제 선택, 질문 입력, 카드 선택, 결과 화면 흐름을 확인합니다.</span>
          </a>
        </div>
        <p class="version">확인용 버전: 20260516-p0-001</p>
      </section>
    </main>
  </body>
</html>
