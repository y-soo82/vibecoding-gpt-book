<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>햇살 기록실 | 사진 한 장에서 시작한 작은 웹사이트</title>
  <meta name="description" content="따뜻한 사진 분위기를 살린 한 페이지 소개 웹사이트입니다." />

  <style>
    :root {
      --bg: #f8ecd2;
      --bg-soft: #fff8ea;
      --paper: #fffdf7;
      --ink: #4f3524;
      --muted: #746351;
      --line: #b48a5d;
      --leaf: #497c60;
      --terracotta: #c8734f;
      --gold: #d9b06f;
      --shadow: 0 24px 70px rgba(82, 55, 32, 0.16);
      --radius-xl: 34px;
      --radius-lg: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(115deg, rgba(255,255,255,0.30) 0 9%, transparent 9% 18%),
        linear-gradient(115deg, transparent 0 16%, rgba(255,255,255,0.18) 16% 22%, transparent 22% 100%),
        var(--bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    .hero {
      width: min(1120px, 100%);
      display: grid;
      grid-template-columns: 1fr 0.94fr;
      align-items: center;
      gap: clamp(26px, 5vw, 74px);
      padding: clamp(24px, 4vw, 56px);
      border: 1px solid rgba(180, 138, 93, 0.26);
      border-radius: var(--radius-xl);
      background: rgba(255, 248, 234, 0.78);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: auto -10% -26% -10%;
      height: 34%;
      background: linear-gradient(90deg, rgba(214, 170, 111, 0.72), rgba(194, 142, 86, 0.62));
      z-index: 0;
    }

    .copy,
    .visual {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 18px;
      padding: 8px 13px;
      border: 1px solid rgba(180, 138, 93, 0.32);
      border-radius: 999px;
      background: rgba(255, 253, 247, 0.78);
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--leaf);
      box-shadow: 14px 0 0 var(--terracotta);
    }

    h1 {
      margin: 0;
      font-size: clamp(46px, 8vw, 88px);
      line-height: 0.98;
      letter-spacing: -0.08em;
      font-weight: 900;
    }

    .lead {
      margin: 24px 0 0;
      max-width: 560px;
      color: var(--muted);
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.72;
      letter-spacing: -0.04em;
      word-break: keep-all;
    }

    .summary-box {
      margin: 28px 0 0;
      padding: 17px 18px;
      border: 1px solid rgba(180, 138, 93, 0.28);
      border-radius: 20px;
      background: rgba(255, 253, 247, 0.68);
      color: #5d4a39;
      font-size: 15px;
      line-height: 1.65;
      letter-spacing: -0.03em;
      word-break: keep-all;
    }

    .cta {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 58px;
      margin-top: 32px;
      padding: 0 30px;
      border-radius: 999px;
      background: var(--ink);
      color: #fff8ea;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.04em;
      box-shadow: 0 14px 26px rgba(79, 53, 36, 0.24);
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      background: #3f2a1d;
      box-shadow: 0 18px 34px rgba(79, 53, 36, 0.28);
    }

    .visual-card {
      padding: clamp(12px, 2vw, 18px);
      border: 1px solid rgba(180, 138, 93, 0.28);
      border-radius: var(--radius-lg);
      background: rgba(255, 253, 247, 0.9);
      transform: rotate(-2deg);
      box-shadow: 0 20px 44px rgba(92, 63, 36, 0.14);
    }

    .visual-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .caption {
      margin: 14px 4px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      letter-spacing: -0.02em;
    }

    @media (max-width: 820px) {
      .page {
        min-height: auto;
        padding: 14px;
        place-items: start center;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 22px;
        padding: 22px 16px 18px;
        border-radius: 28px;
      }

      .hero::before {
        height: 20%;
        opacity: 0.72;
      }

      .copy {
        text-align: center;
      }

      .eyebrow {
        margin-bottom: 13px;
        font-size: 13px;
      }

      h1 {
        font-size: clamp(48px, 14.5vw, 64px);
        line-height: 0.95;
        letter-spacing: -0.09em;
      }

      .lead {
        max-width: 24rem;
        margin: 17px auto 0;
        font-size: 18px;
        line-height: 1.55;
      }

      .summary-box {
        display: none;
      }

      .cta {
        width: min(100%, 360px);
        min-height: 62px;
        margin-top: 22px;
        font-size: 19px;
        box-shadow: 0 16px 30px rgba(79, 53, 36, 0.28);
      }

      .visual-card {
        width: min(100%, 420px);
        margin: 0 auto;
        padding: 10px;
        border-radius: 22px;
        transform: rotate(0);
      }

      .visual-card img {
        border-radius: 16px;
        max-height: 42vh;
        object-fit: cover;
      }

      .caption {
        margin-top: 10px;
        text-align: center;
        font-size: 13px;
      }
    }

    @media (max-width: 420px) {
      .page {
        padding: 10px;
      }

      .hero {
        padding: 20px 14px 16px;
        gap: 18px;
      }

      .eyebrow {
        padding: 7px 11px;
        font-size: 12px;
      }

      h1 {
        font-size: 50px;
      }

      .lead {
        font-size: 17px;
      }

      .cta {
        width: 100%;
        min-height: 60px;
      }

      .visual-card img {
        max-height: 38vh;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero" aria-labelledby="site-title">
      <div class="copy">
        <p class="eyebrow">사진 한 장으로 시작하는 소개 페이지</p>

        <h1 id="site-title">햇살<br />기록실</h1>

        <p class="lead">
          따뜻한 사진과 짧은 문장으로, 이곳이 어떤 공간인지 바로 보여주는
          한 페이지 웹사이트입니다.
        </p>

        <div class="summary-box">
          처음 방문한 사람은 대표 이미지, 소개 문장, 버튼 순서로 자연스럽게 확인할 수 있습니다.
          베이지·브라운 색감을 중심으로 차분하고 부드러운 인상을 줍니다.
        </div>

        <a class="cta" href="mailto:hello@example.com" aria-label="메일로 기록 시작하기">
          기록 시작하기
        </a>
      </div>

      <div class="visual" aria-label="대표 이미지 영역">
        <figure class="visual-card">
          <img src="sample-image.png" alt="햇살 기록실이라는 문구와 식물, 종이가 놓인 따뜻한 일러스트 이미지" />
          <figcaption class="caption">
            사진 분위기를 살려 첫 화면에서 바로 기억되는 소개 페이지입니다.
          </figcaption>
        </figure>
      </div>
    </section>
  </main>
</body>
</html>
